slices:
    slice_boarders: 
        vcp: [4.001]
        non_vcp: [3.001, 4.001, 5.001, 6.001]
    underflow: True
    overflow: True
vcp:
    data_columns:
        spray_frequency: 'Pattern Plating_Spray Frequency|Copper (HZ)'
        constraints:
            plating_time:
                lower: 34
                upper: 38
            current_density:
                lower: 15
                upper: 40
            spray_frequency:
                lower: 30
                upper: 70
        fit_parameters:
            - plating_time
            - current_density
            - board_thickness
            - spray_frequency
        fixed_values:
            plating_time: 36
    calculation_model: board_linear_calculation
    fit_model: 'linear_board_and_spray'
    start_values: [34, 20, 1, 42]
non_vcp:
    data_columns:
        constraints:
            current_density:
                lower: 10
                upper: 36
            plating_time:
                lower: 60
                upper: 90
        fit_parameters:
            - plating_time
            - current_density
            - board_thickness
    calculation_model: board_linear_calculation
    fit_model: 'linear_board'
    start_values: [61, 12, 1]
common_data_columns:
    board_thickness: 'Board Thickness (mm)'
    target: minimal_thickness
    current_density: 'Pattern Plating_Copper Current Density'
    plating_time: 'Pattern Plating_Copper Plating Time (min)'
    requirement_column: 'min_requirement'
    constraints:
        board_thickness:
            lower: 1e-2
            upper: 20
errormodel: 
    model_type: gaussian
    reg_model: lambda
    reg_value: 0.1
nan_value: nan